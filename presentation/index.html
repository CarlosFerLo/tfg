<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph Slides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Inconsolata:wght@600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
 
    /* ── Header ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: flex-start;
      flex-direction: column;
      padding: 16px 22px 0;
      pointer-events: none;
    }
 
    .slide-eyebrow {
      font-family: 'Inconsolata', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: #5c6bc0;
      text-shadow: 0 1px 4px rgba(255,255,255,0.8);
      margin-bottom: 2px;
    }
 
    .slide-title {
      font-size: 14px;
      font-weight: 700;
      color: #1a237e;
      text-shadow: 0 1px 6px rgba(255,255,255,0.9);
    }
 
    /* ── Graph containers ── */
    .graph-wrapper {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
    }
 
    .graph-slide {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      background: transparent;
    }
 
    .graph-slide.active {
      opacity: 1;
      pointer-events: auto;
    }
 
    /* ── Bottom nav ── */
    .nav {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
    }
 
    .nav-btn {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(63,81,181,0.3);
      color: #3f51b5;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      line-height: 1;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      backdrop-filter: blur(4px);
    }
 
    .nav-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.95);
      border-color: rgba(63,81,181,0.55);
      box-shadow: 0 2px 10px rgba(63,81,181,0.18);
    }
 
    .nav-btn:disabled { opacity: 0.2; cursor: default; box-shadow: none; }
 
    .dots {
      display: flex;
      gap: 7px;
      align-items: center;
    }
 
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(63,81,181,0.25);
      transition: background 0.3s, transform 0.3s;
      cursor: pointer;
    }
 
    .dot:hover { background: rgba(63,81,181,0.5); }
 
    .dot.active {
      background: #3f51b5;
      transform: scale(1.5);
    }
 
    /* ── Camera button ── */
    .capture-btn {
      position: fixed;
      top: 16px; right: 18px;
      z-index: 10;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(63,81,181,0.3);
      color: #3f51b5;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      backdrop-filter: blur(4px);
    }
    .capture-btn:hover {
      background: rgba(255,255,255,0.95);
      border-color: rgba(63,81,181,0.55);
      box-shadow: 0 2px 10px rgba(63,81,181,0.18);
    }
 
    /* ── Loading ── */
    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9fa8da;
      font-family: 'Inconsolata', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
    }
  </style>
</head>

    // ── Colour palette per group ──────────────────────────────────
    const NODE_COLORS = {
      1: "#C62828",  // crimson  — types / propositions
      2: "#00796B",  // teal     — base / identity nodes
      3: "#F57F17",  // amber    — universe / prop nodes
      4: "#696969"
    };
    const LINK_COLOR  = "#546E7A";   // blue-grey, legible on light bg
    const ARROW_COLOR = "#37474F";
 
    // ── Presentation engine ───────────────────────────────────────
    let current = 0;
    const initialized = new Set();
    const instances   = [];
 
    function initGraph(index) {
      if (initialized.has(index)) return;
      initialized.add(index);
 
      const el = document.getElementById("slide-" + index);
      el.innerHTML = "";
      const { data } = GRAPHS[index];
 
      const Graph = ForceGraph3D({ rendererConfig: { alpha: true, antialias: true, preserveDrawingBuffer: true } })(el)
        .graphData(data)
        .nodeId("id")
        .nodeLabel(node =>
          `<span style="color:#1a237e;font-weight:600;
            background:rgba(255,255,255,0.9);
            padding:2px 8px;border-radius:3px;">
            ${node.label}
          </span>`
        )
        .nodeColor(node => NODE_COLORS[node.group] || "#5c6bc0")
        .nodeOpacity(0.95)
        .linkColor(() => LINK_COLOR)
        .linkDirectionalArrowLength(5)
        .linkDirectionalArrowRelPos(1)
        .linkDirectionalArrowColor(() => ARROW_COLOR)
        .linkLabel(link =>
          `<span style="color:#37474f;
            background:rgba(255,255,255,0.9);
            padding:2px 8px;border-radius:3px;">
            ${link.label}
          </span>`
        )
        .linkOpacity(0.65)
        .backgroundColor("rgba(0,0,0,0)")
        .width(el.offsetWidth)
        .height(el.offsetHeight);
 
      Graph.d3Force("charge").strength(-120);
      Graph.d3Force("link").distance(70);
      setTimeout(() => Graph.zoomToFit(400), 1500);
 
      instances[index] = Graph;
    }
 
    function goTo(index) {
      if (index < 0 || index >= GRAPHS.length) return;
      document.getElementById("slide-" + current).classList.remove("active");
      current = index;
      document.getElementById("slide-title").textContent = GRAPHS[current].title;
      document.getElementById("prev-btn").disabled = current === 0;
      document.getElementById("next-btn").disabled = current === GRAPHS.length - 1;
      document.querySelectorAll(".dot").forEach((d, i) =>
        d.classList.toggle("active", i === current)
      );
      document.getElementById("slide-" + current).classList.add("active");
      initGraph(current);
    }
 
    // ── Screenshot capture ────────────────────────────────────────
    function captureGraph() {
      const canvas = document.querySelector("#slide-" + current + " canvas");
      if (!canvas) return;
      const link = document.createElement("a");
      link.download = "graph-" + (current + 1) + ".png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
 
    document.getElementById("capture-btn").addEventListener("click", captureGraph);
 
    document.getElementById("prev-btn").addEventListener("click", () => goTo(current - 1));
    document.getElementById("next-btn").addEventListener("click", () => goTo(current + 1));
    document.querySelectorAll(".dot").forEach(dot =>
      dot.addEventListener("click", () => goTo(parseInt(dot.dataset.index)))
    );
    document.addEventListener("keydown", e => {
      if (e.key === "ArrowRight" || e.key === "ArrowDown") goTo(current + 1);
      if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   goTo(current - 1);
    });
 
    window.addEventListener("resize", () => {
      instances.forEach((g, i) => {
        if (!g) return;
        const el = document.getElementById("slide-" + i);
        g.width(el.offsetWidth).height(el.offsetHeight);
      });
    });
 
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
 
    loadScript("https://unpkg.com/three@0.152.2/build/three.min.js")
      .then(() => loadScript("https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"))
      .then(() => initGraph(0))

        document.getElementById("slide-0").innerHTML =
          `<p style="color:#c62828;padding:40px;font-family:monospace;font-size:12px">Failed to load libraries: ${err}</p>`;
      });
